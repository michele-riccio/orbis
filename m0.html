<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M0 Executive Summary · ORBIS Italia × Ribrain</title>
<link href="https://fonts.googleapis.com/css2?family=Afacad+Flux:ital,wght@0,300;0,400;0,500;0,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F2F5FA;--surface:#FFF;--border:#D8E0EE;--blue:#0050A0;--energy:#D9730D;--ink:#0A1628;--ink3:#5A7090;--ink4:#8FA4BC}
body{background:var(--bg);color:var(--ink);font-family:"DM Sans",sans-serif;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
.wrap{max-width:560px}
.code{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--energy);margin-bottom:1.5rem;display:flex;align-items:center;justify-content:center;gap:.75rem}
.code::before,.code::after{content:"";width:24px;height:1px;background:var(--energy)}
h1{font-family:"Afacad Flux",sans-serif;font-size:clamp(2.5rem,8vw,6rem);font-weight:400;line-height:.92;letter-spacing:-.04em;color:var(--ink);margin-bottom:1rem}
h1 em{font-style:italic;font-weight:300;color:var(--energy)}
p{font-size:15px;color:var(--ink3);line-height:1.75;margin-bottom:2.5rem}
.links{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn{padding:.8rem 1.8rem;border-radius:99px;text-decoration:none;font-size:12px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;transition:all .2s}
.btn.primary{background:var(--blue);color:#fff}
.btn.primary:hover{background:#0062C4;transform:translateY(-2px)}
.btn.ghost{border:1px solid var(--border);color:var(--ink3)}
.btn.ghost:hover{border-color:var(--blue);color:var(--blue)}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="code">00 · Executive Summary</div>
  <h1>In <em>preparazione.</em></h1>
  <p>L'Executive Summary è l'ultimo modulo del cruscotto — verrà completato dopo la revisione di tutti i moduli. Sintetizzerà il gap attuale Orbis, la proposta Ribrain, i KPI attesi e l'investimento consigliato.</p>
  <div class="links">
    <a href="index.html" class="btn primary">← Torna alla home</a>
    <a href="m1.html" class="btn ghost">Vai al Modulo 01 →</a>
  </div>
</div>
<script>
gsap.fromTo("#wrap",{opacity:0,y:30},{opacity:1,y:0,duration:.9,ease:"power3.out"});
</script>
</body>
</html>
